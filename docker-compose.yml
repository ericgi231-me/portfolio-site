services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - web
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: packages/react/Dockerfile
    image: ${FRONTEND_IMAGE:?need FRONTEND_IMAGE}
    expose:
      - "80"
    restart: unless-stopped
    networks:
      internal:
      web:
        aliases:
          - ${APP_NAME:?need APP_NAME}

  backend:
    build:
      context: packages/php
      dockerfile: Dockerfile
    image: ${BACKEND_IMAGE:?need BACKEND_IMAGE}
    expose:
      - "80"
    environment:
      - DB_HOST=database
      - DB_NAME=portfolio
      - DB_USER=portfolio_user
      - DB_PASSWORD=${DB_PASSWORD:?need DB_PASSWORD}
    networks:
      - internal
    restart: unless-stopped

  database:
    image: mysql:8.0
    environment:
      - MYSQL_DATABASE=portfolio
      - MYSQL_USER=portfolio_user
      - MYSQL_PASSWORD=${DB_PASSWORD:?need DB_PASSWORD}
      - MYSQL_RANDOM_ROOT_PASSWORD=yes
    volumes:
      - mysql-data:/var/lib/mysql
      - ./packages/database:/docker-entrypoint-initdb.d:ro
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "portfolio_user", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  caddy-data:
  caddy-config:
  mysql-data:

networks:
  internal:
    driver: bridge
  web:
    external: true