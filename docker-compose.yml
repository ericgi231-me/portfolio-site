services:
  caddy:
    build:
      context: ./packages/caddy
      dockerfile: ./Dockerfile
    image: ${CADDY_IMAGE:-?need CADDY_IMAGE}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - web
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: packages/react/Dockerfile
    image: ${FRONTEND_IMAGE:?need FRONTEND_IMAGE}
    expose:
      - "80"
    restart: unless-stopped
    networks:
      web:
        aliases:
          - ${APP_NAME:?need APP_NAME}

volumes:
  caddy-data:
  caddy-config:

networks:
  web:
    external: true